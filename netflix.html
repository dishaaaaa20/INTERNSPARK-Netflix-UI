<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix Clone</title>

    <link rel="stylesheet" href="netflix.css">
</head>

<body>

    <div class="navbar">

        <div class="logo">
            NETFLIX
        </div>

        <div class="nav-links">
            <a href="#">Home</a>
            <a href="#">TV Shows</a>
            <a href="#">Movies</a>
            <a href="#">My List</a>
        </div>

    </div>

    <div class="hero">

        <div class="hero-text">

            <h1>Stranger Things</h1>

            <p>
                A small town uncovers supernatural mysteries after a boy disappears.
            </p>

            <button class="play-btn">Play</button>
            <button class="info-btn">More Info</button>

        </div>

    </div>

    <div class="section">

        <h2>Trending Now</h2>

        <div class="movie-row" id="trending-row">

        </div>

    </div>

    <div class="section">

        <h2>Popular on Netflix</h2>

        <div class="movie-row" id="popular-row">

        </div>

    </div>

    <div class="section">

        <h2>Comedy Shows</h2>

        <div class="movie-row" id="comedy-row">

        </div>

    </div>

    <footer>

        <p>Netflix Clone Project</p>

    </footer>

    <script src="netflix.js"></script>

</body>

</html>
